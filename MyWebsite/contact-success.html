<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message received | Soul Waves</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    .success-page__rule {
      width: 48px;
      height: 2px;
      background: var(--sw-copper);
      margin: 0 auto 2.5rem;
    }
    .success-page__heading {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--sw-red);
      line-height: 1;
      margin-bottom: 1.25rem;
    }
    .success-page__text {
      font-size: 1rem;
      color: var(--sw-brown);
      opacity: 0.75;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

  <div class="success-page">
    <div class="success-page__rule"></div>
    <h1 class="success-page__heading">Got it.</h1>
    <p class="success-page__text">
      Your message is in. I usually reply within one business day.
    </p>
    <a href="/" class="btn-primary">Back to home</a>
  </div>

</body>
</html>
